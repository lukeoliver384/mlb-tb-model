name: Daily slate ping

on:
  schedule:
    # 20:00 UTC = 4:00 PM EDT / 3:00 PM EST. GitHub cron is UTC-only (no DST
    # awareness) and best-effort timed — it can run a few minutes late during
    # GitHub's peak load. Adjust the hour below to change when it fires.
    - cron: "0 20 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - run: python scripts/daily_ping.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
