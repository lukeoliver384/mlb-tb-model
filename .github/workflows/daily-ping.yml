name: Daily slate ping

on:
  schedule:
    # Times below are ET (EDT, UTC-4, in effect through early Nov). GitHub
    # cron is UTC-only — no DST awareness — so each offset shifts by an hour
    # once EST (UTC-5) kicks back in; adjust then if it matters to you.
    # Runs are also best-effort timed and can land a few minutes late during
    # GitHub's peak load.
    - cron: "30 13 * * *"   # 9:30 AM ET
    - cron: "0 16 * * *"    # 12:00 PM ET
    - cron: "0 20 * * *"    # 4:00 PM ET
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install requests

      - run: python scripts/daily_ping.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
