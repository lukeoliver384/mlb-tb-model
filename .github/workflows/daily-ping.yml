name: Daily slate ping

on:
  schedule:
    # Times are US Central via UTC (GitHub cron has no DST). Values below are CDT
    # (UTC-5, Mar-Nov baseball season); once CST (UTC-6) returns in Nov each shifts
    # an hour earlier in Central. Best-effort timing; can land a few minutes late.
    - cron: "0 14 * * *"    # 9:00 AM CT
    - cron: "0 17 * * *"    # 12:00 PM CT
    - cron: "0 21 * * *"    # 4:00 PM CT
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install requests tzdata

      - run: python scripts/daily_ping.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
