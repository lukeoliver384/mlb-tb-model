name: Nightly tracker grading

on:
  schedule:
    # 13:00 UTC = 9:00 AM ET (EDT). Runs after the prior day's games — including
    # late West-coast finishes — have settled in the MLB API. GitHub cron is
    # UTC-only (no DST), so this shifts to 8:00 AM ET once EST returns; adjust if
    # it matters. Best-effort timing; may land a few minutes late.
    - cron: "0 13 * * *"
  workflow_dispatch: {}

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install requests gspread google-auth

      - run: python scripts/daily_grade.py
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          TRACKER_SHEET_NAME: ${{ secrets.TRACKER_SHEET_NAME }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
