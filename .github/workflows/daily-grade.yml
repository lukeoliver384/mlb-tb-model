name: Nightly tracker grading

on:
  schedule:
    # 7:00 AM US Central. Runs after the prior day's games — including late
    # West-coast finishes — have settled in the MLB API. GitHub cron is UTC-only
    # (no DST): 12:00 UTC = 7 AM CDT (Mar-Nov, baseball season). Once CST returns
    # in Nov it becomes 6 AM CT; harmless for grading. Best-effort timing.
    - cron: "0 12 * * *"
  workflow_dispatch: {}

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install requests gspread google-auth tzdata

      - run: python scripts/daily_grade.py
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          TRACKER_SHEET_NAME: ${{ secrets.TRACKER_SHEET_NAME }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
